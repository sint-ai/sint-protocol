version: "3.9"

services:
  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway-server/Dockerfile
    ports:
      - "3100:3100"
    environment:
      SINT_PORT: "3100"
      SINT_STORE: postgres
      SINT_CACHE: redis
      DATABASE_URL: postgresql://sint:sint@postgres:5432/sint
      REDIS_URL: redis://redis:6379
      SINT_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/v1/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sint
      POSTGRES_PASSWORD: sint
      POSTGRES_DB: sint
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../packages/persistence/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sint -d sint"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 10

  ros2-guard:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SINT_GATEWAY_URL: http://gateway:3100
    depends_on:
      gateway:
        condition: service_healthy
    command: ["bash", "-lc", "source /opt/ros/humble/setup.bash && python3 /demo/ros2_guard.py"]

volumes:
  pgdata:

