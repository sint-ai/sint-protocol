name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # Required for npm provenance (SLSA Level 2)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run tests (gate)
        run: pnpm run test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish core packages (dependency order)
        run: |
          PACKAGES=(
            "packages/core"
            "packages/capability-tokens"
            "packages/evidence-ledger"
            "packages/policy-gateway"
            "packages/bridge-mcp"
            "packages/bridge-ros2"
            "packages/bridge-mavlink"
            "packages/bridge-iot"
            "packages/bridge-a2a"
            "packages/bridge-economy"
            "packages/token-registry"
          )

          FAILED=()
          for pkg in "${PACKAGES[@]}"; do
            name=$(node -p "require('./$pkg/package.json').name")
            echo "Publishing $name..."
            if (cd "$pkg" && npm publish --access public --provenance); then
              echo "✓ $name"
            else
              exit_code=$?
              # 409 = already published at this version, treat as success
              if npm view "$name@$(node -p "require('./$pkg/package.json').version")" > /dev/null 2>&1; then
                echo "✓ $name (already published)"
              else
                echo "✗ $name FAILED (exit $exit_code)"
                FAILED+=("$name")
              fi
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed to publish: ${FAILED[*]}"
            echo "::error::If you see E403 with 2FA error: the NPM_TOKEN must be a Granular Access Token"
            echo "::error::with 'Bypass 2FA' enabled. Generate at npmjs.com → Access Tokens → Generate New Token → Granular."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish SDK
        run: |
          (cd packages/sdk && npm publish --access public --provenance) || echo "SDK publish skipped"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify installation
        run: |
          cd /tmp
          # Wait for npm CDN propagation (up to 60s)
          for i in $(seq 1 6); do
            if npm install @pshkv/core@${{ steps.version.outputs.version }} --prefer-online 2>/dev/null; then
              break
            fi
            echo "Registry not ready yet, retrying in 10s... ($i/6)"
            sleep 10
          done
          npm install @pshkv/core@${{ steps.version.outputs.version }} --prefer-online
          node -e "const c = require('@pshkv/core'); console.log('✓ @pshkv/core loads OK, exports:', Object.keys(c).length, 'items')"

      - name: Create GitHub Release summary
        run: |
          echo "## Published v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install @pshkv/core@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published packages:" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/core\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/gate-capability-tokens\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/gate-evidence-ledger\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/gate-policy-gateway\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-mcp\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-ros2\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-mavlink\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-iot\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-a2a\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/bridge-economy\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@pshkv/token-registry\`" >> $GITHUB_STEP_SUMMARY
