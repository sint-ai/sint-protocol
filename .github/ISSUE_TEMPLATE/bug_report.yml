name: Bug Report
description: Report a bug in SINT Protocol
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@pshkv/core, @sint/bridge-mcp, etc."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SINT Protocol version (run `pnpm list @sint/core`)
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — cosmetic or minor inconvenience
        - Medium — incorrect behavior, workaround exists
        - High — blocks usage, no workaround
        - Critical — security vulnerability or data loss
    validations:
      required: true
